<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- INEF UCI — Isotipo: 4 arcos concéntricos -->
  <!-- Arco exterior (más tenue) -->
  <path d="M 15,50 A 35,35 0 0,1 85,50" fill="none" stroke="#7FB8D8" stroke-width="8" stroke-linecap="round"/>
  <!-- Arco 2 -->
  <path d="M 21,50 A 29,29 0 0,1 79,50" fill="none" stroke="#4A8FB8" stroke-width="8" stroke-linecap="round"/>
  <!-- Arco 3 -->
  <path d="M 27,50 A 23,23 0 0,1 73,50" fill="none" stroke="#1B3A5C" stroke-width="8" stroke-linecap="round"/>
  <!-- Arco interior (más oscuro, primario) -->
  <path d="M 33,50 A 17,17 0 0,1 67,50" fill="none" stroke="#1B3A5C" stroke-width="9" stroke-linecap="round"/>
</svg>
